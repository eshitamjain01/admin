<html>
<head>

  <link rel="stylesheet" href="admin.css">
</head>
<body>

    <h3>Admin Panel</h3>
    <button onclick="logout()">Logout</button>

  <!-- VIEW ORDERS -->
  <h2>Orders</h2>

  <h2>Customers</h2>

  </div>
</div> 

<script src="dashboard.js"></script>
</body>
</html>
